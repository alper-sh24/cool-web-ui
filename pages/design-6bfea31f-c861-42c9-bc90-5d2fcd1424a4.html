<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Header Design</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <script src="https://unpkg.com/@phosphor-icons/web" vid="6"></script>
    <style vid="7">
        
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-sans text-gray-900" vid="8">

    
    <div class="w-[360px] h-[280px] bg-white rounded-[40px] overflow-hidden shadow-2xl flex flex-col border-[6px] border-gray-900 relative" vid="9">
        
        
        
        
        <header class="bg-white border-b border-gray-100 px-4 pt-5 pb-3 z-10 shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)]" vid="10">
            
            
            <div class="flex items-center justify-between mb-3" vid="11">
                <h1 class="text-base font-semibold text-gray-800 tracking-tight" vid="12">Search Fasteners</h1>
                <button class="w-7 h-7 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 transition-colors" vid="13">
                    <i class="ph-bold ph-x text-sm" vid="14"></i>
                </button>
            </div>

            
            <div class="flex items-center gap-2 mb-3" vid="15">
                
                <div class="flex-1 bg-white border border-gray-200 rounded-full flex items-center p-1 shadow-sm focus-within:border-indigo-400 focus-within:ring-2 focus-within:ring-indigo-50 transition-all" vid="16">
                    
                    <button class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-colors shrink-0 shadow-inner" title="Toggle AI Search" vid="17">
                        <i class="ph-fill ph-sparkle text-lg" vid="18"></i>
                    </button>
                    
                    
                    <input type="text" placeholder="Describe the bolt you need..." class="flex-1 bg-transparent border-none outline-none px-2.5 text-[13px] text-gray-800 placeholder-gray-400 w-full font-medium" vid="19">
                </div>
                
                
                <button class="w-10 h-10 rounded-full bg-gray-900 text-white flex items-center justify-center shadow-md hover:bg-gray-800 transition-colors shrink-0" vid="20">
                    <i class="ph-bold ph-magnifying-glass text-lg" vid="21"></i>
                </button>
            </div>

            
            <div class="flex items-center justify-between" vid="22">
                
                
                <button class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-[13px] font-medium text-gray-700 hover:bg-gray-100 transition-colors" vid="23">
                    <i class="ph ph-faders text-[15px] text-gray-500" vid="24"></i>
                    <span vid="25">Filters</span>
                    <span class="flex items-center justify-center bg-indigo-600 text-white text-[10px] font-bold h-4 min-w-[16px] px-1 rounded-full leading-none ml-0.5 shadow-sm" vid="26">
                        3
                    </span>
                </button>

                <div class="flex items-center gap-2" vid="27">
                    
                    <button class="flex items-center gap-1.5 px-3 py-1.5 bg-amber-50 border border-amber-100 rounded-full text-[13px] font-medium text-amber-700 hover:bg-amber-100 transition-colors" vid="28">
                        <i class="ph-fill ph-lightbulb text-[15px] text-amber-500" vid="29"></i>
                        <span vid="30">Tips</span>
                    </button>

                    
                    <button class="flex items-center justify-center w-8 h-8 bg-gray-50 border border-gray-200 rounded-full text-gray-600 hover:bg-gray-100 transition-colors" vid="31">
                        <i class="ph-fill ph-squares-four text-[15px]" vid="32"></i>
                    </button>
                </div>

            </div>

        </header>

        
        
        
        <main class="flex-1 bg-gray-50 p-4 overflow-y-auto flex flex-col gap-3" vid="33">
            
            <div class="flex items-center justify-between px-1" vid="34">
                <div class="w-24 h-4 bg-gray-200 rounded-md" vid="35"></div>
                <div class="w-16 h-3 bg-gray-200 rounded-md" vid="36"></div>
            </div>

            
            <div class="grid grid-cols-2 gap-3 mt-1" vid="37">
                
                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-2" vid="38">
                    <div class="w-full aspect-square bg-gray-100 rounded-xl" vid="39"></div>
                    <div class="w-3/4 h-3 bg-gray-200 rounded-md mt-1" vid="40"></div>
                    <div class="w-1/2 h-3 bg-gray-200 rounded-md" vid="41"></div>
                </div>
                
                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-2" vid="42">
                    <div class="w-full aspect-square bg-gray-100 rounded-xl" vid="43"></div>
                    <div class="w-3/4 h-3 bg-gray-200 rounded-md mt-1" vid="44"></div>
                    <div class="w-1/2 h-3 bg-gray-200 rounded-md" vid="45"></div>
                </div>
            </div>

        </main>

    </div>


</body></html>
