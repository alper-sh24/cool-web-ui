<style vid="8">
  :root {
    --bg-void: #080809;
    --bg-panel: #1A1A1C;
    --bg-element: #252528;
    --bg-element-hover: #2C2C30;
    --text-main: #F2F2F2;
    --text-muted: #8E8E93;
    --text-dark: #5A5A5F;
    --border-subtle: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.15);
    --c-yellow: #D4B856;
    --c-green: #73A881;
    --c-purple: #AB84B5;
    --c-red: #FF453A;
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  body {
    background-color: var(--bg-void);
    color: var(--text-main);
    font-family: var(--font-ui);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
    overflow: hidden;
  }

  .chassis {
    width: 1100px;
    background: var(--bg-void);
    border-radius: 24px;
    border: 1px solid var(--border-subtle);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px 8px 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .sys-status {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    display: flex;
    gap: 16px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-green);
    margin-right: 6px;
    box-shadow: 0 0 8px var(--c-green);
  }

  .config-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 520px;
  }

  .osc-row {
    background: var(--bg-panel);
    border-radius: 16px;
    border: 1px solid var(--border-subtle);
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 80px 240px 1fr 280px;
    align-items: center;
    gap: 32px;
    transition: border-color 0.2s;
  }

  .osc-row:hover {
    border-color: var(--border-strong);
  }

  .osc-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dark);
    font-weight: 500;
  }

  .waveform-selector {
    display: flex;
    gap: 4px;
    background: #111;
    padding: 4px;
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
  }

  .wave-btn {
    flex: 1;
    height: 32px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .wave-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--text-dark);
    fill: none;
    stroke-width: 1.5;
  }

  .wave-btn.active {
    background: var(--bg-element);
  }

  .wave-btn.active svg {
    stroke: var(--text-main);
  }

  .wave-btn:hover:not(.active) svg {
    stroke: var(--text-muted);
  }

  .tuning-controls {
    display: flex;
    gap: 24px;
  }

  .knob-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .knob-track {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #111;
    border: 1px solid var(--border-subtle);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .knob-indicator {
    width: 2px;
    height: 12px;
    background: var(--text-muted);
    border-radius: 1px;
    position: absolute;
    top: 4px;
    transform-origin: bottom center;
  }

  .knob-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dark);
    text-transform: uppercase;
  }

  .vca-strip {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-left: 32px;
    border-left: 1px solid var(--border-subtle);
  }

  .vca-readout {
    width: 32px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-main);
    text-align: right;
  }

  .vca-slider-track {
    flex: 1;
    height: 6px;
    background: #000;
    border-radius: 3px;
    position: relative;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  .vca-slider-fill {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    background: var(--text-muted);
    border-radius: 3px;
  }

  .vca-slider-thumb {
    position: absolute;
    width: 16px;
    height: 24px;
    background: var(--bg-element);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }

  
  .osc-01 .vca-slider-fill { background: var(--c-yellow); }
  .osc-02 .vca-slider-fill { background: var(--c-green); }
  .osc-03 .vca-slider-fill { background: var(--c-purple); }
  .osc-04 .vca-slider-fill { background: var(--c-red); }

  .footer-meta {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    padding: 12px 8px 0 8px;
    border-top: 1px solid var(--border-subtle);
  }

  .meta-item {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dark);
    display: flex;
    gap: 8px;
  }

  .meta-item span { color: var(--text-muted); }
</style>
</head>
