<!DOCTYPE html>
<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Identity Matrix Visualization</title>
    <style vid="5">
        

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');

        :root {
            --bg-color: #F3F3F8;
            --ink-color: #16161A;
            --surface-color: #FFFFFF;
            --lavender: #C6BBFF;
            --lime: #CDFF4D;
            
            --font-display: 'Oswald', sans-serif;
            --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            --radius-sm: 12px;
            --radius-md: 24px;
            --radius-pill: 999px;
            
            --border-width: 1.5px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ink-color);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        
        .dashboard {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 24px;
            gap: 24px;
        }

        .side-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 10;
        }

        .vis-container {
            flex: 1;
            background-color: var(--bg-color);
            position: relative;
            border-radius: var(--radius-md);
            
            overflow: hidden;
        }

        
        
        .card {
            background: var(--surface-color);
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card--outlined {
            border: var(--border-width) solid var(--ink-color);
        }

        .card--lavender {
            background: var(--lavender);
            border: none;
        }

        .card--lime {
            background: var(--lime);
            border: none;
        }

        .header-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title-display {
            font-family: var(--font-display);
            font-size: 42px;
            line-height: 1.1;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--ink-color);
            opacity: 0.8;
            font-weight: 500;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px dashed var(--ink-color);
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        .metric-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .metric-value {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
        }

        .metric-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        .pill-row {
            display: flex;
            gap: 12px;
        }

        .pill {
            background: var(--bg-color);
            border: var(--border-width) solid var(--ink-color);
            border-radius: var(--radius-sm);
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .pill:hover {
            background: var(--surface-color);
        }

        .pill-icon {
            width: 32px;
            height: 32px;
            background: var(--lavender);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pill-icon.lime { background: var(--lime); }
        .pill-icon.dark { background: var(--ink-color); color: var(--surface-color); }

        .pill-value {
            font-weight: 700;
            font-size: 18px;
        }
        .pill-label {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.7;
        }

        .btn-primary {
            background: var(--ink-color);
            color: var(--surface-color);
            border: none;
            border-radius: var(--radius-md);
            padding: 18px 24px;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        
        .legend-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: var(--border-width) solid var(--ink-color);
        }

        .legend-dot.meta { background: var(--lavender); }
        .legend-dot.state { background: var(--surface-color); }
        .legend-dot.nature { background: var(--lime); }

        
        #galaxy-canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        
        .axis-line {
            stroke: var(--ink-color);
            stroke-width: 0.5;
            stroke-dasharray: 4 6;
            opacity: 0.3;
        }

        .web-connection {
            stroke: var(--ink-color);
            stroke-width: 1;
            opacity: 0.4;
            transition: stroke-width 0.3s, opacity 0.3s;
        }

        .spiral-path {
            fill: none;
            stroke: var(--ink-color);
            stroke-width: 1.5;
            opacity: 0.15;
            stroke-linecap: round;
        }

        .node {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .node:hover {
            transform: scale(1.3);
        }

        .node-base {
            stroke: var(--ink-color);
            stroke-width: var(--border-width);
        }

        
        .center-identity {
            fill: var(--ink-color);
        }
        
        .center-ring {
            fill: none;
            stroke: var(--ink-color);
            stroke-width: 3;
            stroke-dasharray: 12 8;
        }

        .axis-label {
            font-family: var(--font-ui);
            font-size: 9px;
            font-weight: 600;
            fill: var(--ink-color);
            opacity: 0.5;
            text-anchor: middle;
            dominant-baseline: middle;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        
        .top-bar {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 20;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            background: var(--surface-color);
            border: var(--border-width) solid var(--ink-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .icon-btn.dark {
            background: var(--ink-color);
            border: none;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--ink-color);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-btn.dark svg {
            stroke: var(--surface-color);
        }

        .date-badge {
            background: var(--bg-color);
            border: var(--border-width) solid var(--ink-color);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 600;
        }

        
        #tooltip {
            position: absolute;
            background: var(--ink-color);
            color: var(--surface-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            transform: translate(-50%, -120%);
        }

    </style>
</head>

    <script vid="67">
        

        const svg = document.getElementById('galaxy-canvas');
        const tooltip = document.getElementById('tooltip');
        let width, height, cx, cy;

        
        const NUM_AXES = 36;
        const LAYERS = [
            { name: 'META', radiusMult: 0.3, color: 'var(--lavender)' }, 
            { name: 'STATE', radiusMult: 0.6, color: 'var(--surface-color)' }, 
            { name: 'NATURE', radiusMult: 0.9, color: 'var(--lime)' }    
        ];
        const SPIRAL_TWIST = Math.PI * 1.5; 

        
        let nodes = [];
        let connections = [];

        function init() {
            resize();
            window.addEventListener('resize', () => {
                resize();
                render();
            });
            generateData();
            render();
        }

        function resize() {
            width = svg.clientWidth;
            height = svg.clientHeight;
            cx = width / 2;
            cy = height / 2;
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
        }

        function generateData() {
            nodes = [];
            connections = [];
            const maxRadius = Math.min(width, height) * 0.45;

            
            LAYERS.forEach((layer, layerIndex) => {
                const layerBaseRadius = maxRadius * layer.radiusMult;
                
                for (let i = 0; i < NUM_AXES; i++) {
                    
                    const angleStep = (Math.PI * 2) / NUM_AXES;
                    const baseAngle = i * angleStep;
                    
                    
                    const twistOffset = (layerIndex / LAYERS.length) * SPIRAL_TWIST;
                    const finalAngle = baseAngle + twistOffset;

                    
                    
                    const radiusDeviation = (Math.random() - 0.5) * 40; 
                    const r = layerBaseRadius + radiusDeviation;
                    
                    const x = cx + r * Math.cos(finalAngle);
                    const y = cy + r * Math.sin(finalAngle);

                    
                    const scoreDeviation = Math.random(); 
                    const baseSize = 4 + (scoreDeviation * 12);

                    nodes.push({
                        id: `node-${layerIndex}-${i}`,
                        layer: layer.name,
                        axisIndex: i,
                        x: x,
                        y: y,
                        r: baseSize,
                        color: layer.color,
                        score: (scoreDeviation * 100).toFixed(1)
                    });
                }
            });

            
            
            for (let i = 0; i < nodes.length; i++) {
                const nodeA = nodes[i];
                
                
                
                for (let j = i + 1; j < nodes.length; j++) {
                    const nodeB = nodes[j];
                    const dx = nodeA.x - nodeB.x;
                    const dy = nodeA.y - nodeB.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    
                    if (dist < maxRadius * 0.25 && Math.random() > 0.6) {
                        connections.push({ source: nodeA, target: nodeB });
                    }
                }
            }
        }

        function render() {
            svg.innerHTML = ''; 

            const maxRadius = Math.min(width, height) * 0.45;

            
            LAYERS.forEach((layer) => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute('cx', cx);
                circle.setAttribute('cy', cy);
                circle.setAttribute('r', maxRadius * layer.radiusMult);
                circle.setAttribute('fill', 'none');
                circle.setAttribute('class', 'axis-line');
                svg.appendChild(circle);
            });

            
            for (let i = 0; i < NUM_AXES; i++) {
                const angle = i * ((Math.PI * 2) / NUM_AXES);
                const x2 = cx + maxRadius * Math.cos(angle);
                const y2 = cy + maxRadius * Math.sin(angle);
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute('x1', cx);
                line.setAttribute('y1', cy);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('class', 'axis-line');
                svg.appendChild(line);

                
                if (i % 3 === 0) { 
                    const lx = cx + (maxRadius + 20) * Math.cos(angle);
                    const ly = cy + (maxRadius + 20) * Math.sin(angle);
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute('x', lx);
                    text.setAttribute('y', ly);
                    text.setAttribute('class', 'axis-label');
                    text.textContent = `A${i.toString().padStart(2, '0')}`;
                    svg.appendChild(text);
                }
            }

            
            LAYERS.forEach((layer, layerIndex) => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = '';
                const layerNodes = nodes.filter(n => n.layer === layer.name);
                
                layerNodes.sort((a,b) => a.axisIndex - b.axisIndex);
                
                layerNodes.forEach((n, i) => {
                    if (i === 0) d += `M ${n.x} ${n.y} `;
                    else d += `L ${n.x} ${n.y} `;
                });
                d += 'Z'; 
                path.setAttribute('d', d);
                path.setAttribute('class', 'spiral-path');
                svg.appendChild(path);
            });

            
            connections.forEach(conn => {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute('x1', conn.source.x);
                line.setAttribute('y1', conn.source.y);
                line.setAttribute('x2', conn.target.x);
                line.setAttribute('y2', conn.target.y);
                line.setAttribute('class', 'web-connection');
                svg.appendChild(line);
            });

            
            
            const centerGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            const outerRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            outerRing.setAttribute('cx', cx);
            outerRing.setAttribute('cy', cy);
            outerRing.setAttribute('r', 32);
            outerRing.setAttribute('class', 'center-ring');
            
            const core = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            core.setAttribute('cx', cx);
            core.setAttribute('cy', cy);
            core.setAttribute('r', 12);
            core.setAttribute('class', 'center-identity');

            centerGroup.appendChild(outerRing);
            centerGroup.appendChild(core);
            svg.appendChild(centerGroup);

            
            nodes.forEach(n => {
                const nodeGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                nodeGroup.setAttribute('class', 'node');
                
                
                const shape = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                shape.setAttribute('cx', n.x);
                shape.setAttribute('cy', n.y);
                shape.setAttribute('r', n.r);
                shape.setAttribute('fill', n.color);
                shape.setAttribute('class', 'node-base');
                
                
                if (n.r > 10) {
                    const innerDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    innerDot.setAttribute('cx', n.x);
                    innerDot.setAttribute('cy', n.y);
                    innerDot.setAttribute('r', 2);
                    innerDot.setAttribute('fill', 'var(--ink-color)');
                    nodeGroup.appendChild(shape);
                    nodeGroup.appendChild(innerDot);
                } else {
                    nodeGroup.appendChild(shape);
                }

                
                nodeGroup.addEventListener('mouseenter', (e) => {
                    tooltip.style.opacity = 1;
                    tooltip.style.left = e.clientX + 'px';
                    tooltip.style.top = e.clientY + 'px';
                    tooltip.innerHTML = `${n.layer} Axis ${n.axisIndex}<br><span style="color:var(--lime)">Dev: ${n.score}</span>`;
                    
                    
                    const connectedLines = Array.from(svg.querySelectorAll('.web-connection')).filter(
                        line => (parseFloat(line.getAttribute('x1')) === n.x && parseFloat(line.getAttribute('y1')) === n.y) || 
                                (parseFloat(line.getAttribute('x2')) === n.x && parseFloat(line.getAttribute('y2')) === n.y)
                    );
                    connectedLines.forEach(l => {
                        l.style.strokeWidth = '2.5px';
                        l.style.opacity = '1';
                    });
                });

                nodeGroup.addEventListener('mouseleave', () => {
                    tooltip.style.opacity = 0;
                    
                    const lines = svg.querySelectorAll('.web-connection');
                    lines.forEach(l => {
                        l.style.strokeWidth = '1px';
                        l.style.opacity = '0.4';
                    });
                });

                svg.appendChild(nodeGroup);
            });
        }

        
        init();

    </script>
