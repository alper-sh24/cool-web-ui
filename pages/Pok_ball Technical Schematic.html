    <script vid="30">
        const canvas = document.getElementById('schematic');
        const ctx = canvas.getContext('2d');
        const svgOverlay = document.getElementById('svg-overlay');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const FOCAL_LENGTH = 800;
        const RADIUS = 180;
        
        let edges = [];
        let anchors = {};

        function generateGeometry() {
            edges = [];
            
            const numLat = 16;
            const numLon = 32;
            const seamWidth = 0.15; 

            const addEdge = (p1, p2, type = 'normal') => {
                edges.push({ p1: { ...p1 }, p2: { ...p2 }, type });
            };

            const getSpherePoint = (r, theta, phi) => {
                return {
                    x: r * Math.sin(phi) * Math.cos(theta),
                    y: r * Math.cos(phi),
                    z: r * Math.sin(phi) * Math.sin(theta)
                };
            };

            for (let j = 0; j < numLon; j++) {
                const theta = (j / numLon) * 2 * Math.PI;
                
                for (let i = 0; i < numLat / 2; i++) {
                    const phi1 = (i / numLat) * Math.PI;
                    const phi2 = ((i + 1) / numLat) * Math.PI;
                    
                    if (phi2 > Math.PI / 2 - seamWidth) continue; 
                    
                    addEdge(getSpherePoint(RADIUS, theta, phi1), getSpherePoint(RADIUS, theta, phi2));
                }
                
                for (let i = numLat / 2; i < numLat; i++) {
                    const phi1 = (i / numLat) * Math.PI;
                    const phi2 = ((i + 1) / numLat) * Math.PI;
                    
                    if (phi1 < Math.PI / 2 + seamWidth) continue; 
                    
                    addEdge(getSpherePoint(RADIUS, theta, phi1), getSpherePoint(RADIUS, theta, phi2));
                }
            }

            for (let i = 1; i < numLat; i++) {
                const phi = (i / numLat) * Math.PI;
                
                if (Math.abs(phi - Math.PI / 2) < seamWidth + 0.05) continue;

                for (let j = 0; j < numLon; j++) {
                    const theta1 = (j / numLon) * 2 * Math.PI;
                    const theta2 = ((j + 1) / numLon) * 2 * Math.PI;
                    addEdge(getSpherePoint(RADIUS, theta1, phi), getSpherePoint(RADIUS, theta2, phi));
                }
            }

            const phiTopSeam = Math.PI / 2 - seamWidth;
            const phiBotSeam = Math.PI / 2 + seamWidth;
            const innerRadius = RADIUS * 0.95;

            for (let j = 0; j < numLon; j++) {
                const theta1 = (j / numLon) * 2 * Math.PI;
                const theta2 = ((j + 1) / numLon) * 2 * Math.PI;
                
                addEdge(getSpherePoint(RADIUS, theta1, phiTopSeam), getSpherePoint(RADIUS, theta2, phiTopSeam), 'heavy');
                addEdge(getSpherePoint(RADIUS, theta1, phiBotSeam), getSpherePoint(RADIUS, theta2, phiBotSeam), 'heavy');
                
                addEdge(getSpherePoint(RADIUS, theta1, phiTopSeam), getSpherePoint(innerRadius, theta1, phiTopSeam));
                addEdge(getSpherePoint(RADIUS, theta1, phiBotSeam), getSpherePoint(innerRadius, theta1, phiBotSeam));
                addEdge(getSpherePoint(innerRadius, theta1, phiTopSeam), getSpherePoint(innerRadius, theta1, phiBotSeam));
                addEdge(getSpherePoint(innerRadius, theta1, phiTopSeam), getSpherePoint(innerRadius, theta2, phiTopSeam));
                addEdge(getSpherePoint(innerRadius, theta1, phiBotSeam), getSpherePoint(innerRadius, theta2, phiBotSeam));
            }

            const btnRadiusOuter = RADIUS * 0.25;
            const btnRadiusInner = RADIUS * 0.15;
            const btnSegments = 24;
            
            const getButtonPoint = (r, angle) => {
                const x = r * Math.cos(angle);
                const y = r * Math.sin(angle);
                
                const z = Math.sqrt(RADIUS * RADIUS - x * x - y * y);
                return { x, y, z };
            };

            for (let i = 0; i < btnSegments; i++) {
                const a1 = (i / btnSegments) * 2 * Math.PI;
                const a2 = ((i + 1) / btnSegments) * 2 * Math.PI;
                
                addEdge(getButtonPoint(btnRadiusOuter, a1), getButtonPoint(btnRadiusOuter, a2), 'heavy');
                addEdge(getButtonPoint(btnRadiusInner, a1), getButtonPoint(btnRadiusInner, a2), 'heavy');
                
                const pOut = getButtonPoint(btnRadiusOuter, a1);
                const pDepth = { ...pOut, z: pOut.z - 10 };
                addEdge(pOut, pDepth);
                
                const pOut2 = getButtonPoint(btnRadiusOuter, a2);
                const pDepth2 = { ...pOut2, z: pOut2.z - 10 };
                addEdge(pDepth, pDepth2);
            }

            anchors = {
                top: { x: 0, y: -RADIUS, z: 0 }, 
                seam: { x: 0, y: 0, z: RADIUS * 1.05 }, 
                core: { x: 0, y: 0, z: RADIUS * 0.5 }, 
                bottom: { x: 0, y: RADIUS, z: 0 } 
            };
        }

        function rotate3D(point, pitch, yaw, roll) {
            let { x, y, z } = point;

            
            let cosY = Math.cos(yaw), sinY = Math.sin(yaw);
            let x1 = x * cosY - z * sinY;
            let z1 = x * sinY + z * cosY;
            x = x1; z = z1;

            
            let cosX = Math.cos(pitch), sinX = Math.sin(pitch);
            let y1 = y * cosX - z * sinX;
            let z2 = y * sinX + z * cosX;
            y = y1; z = z2;

            
            let cosZ = Math.cos(roll), sinZ = Math.sin(roll);
            let x2 = x * cosZ - y * sinZ;
            let y2 = x * sinZ + y * cosZ;
            x = x2; y = y2;

            return { x, y, z };
        }

        function project3D(point) {
            const scale = FOCAL_LENGTH / (FOCAL_LENGTH + point.z);
            return {
                x: point.x * scale + width / 2,
                y: point.y * scale + height / 2,
                scale: scale,
                z: point.z 
            };
        }

        const labelConnections = [
            { id: 'top', labelId: 'label-top', align: 'left' },
            { id: 'seam', labelId: 'label-seam', align: 'left' },
            { id: 'core', labelId: 'label-core', align: 'right' },
            { id: 'bottom', labelId: 'label-bottom', align: 'right' }
        ];

        let svgPaths = {};
        
        function initSVG() {
            svgOverlay.innerHTML = ''; 
            labelConnections.forEach(conn => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("class", "svg-line");
                g.appendChild(path);

                const d1 = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                d1.setAttribute("width", "6");
                d1.setAttribute("height", "6");
                d1.setAttribute("class", "svg-diamond");
                g.appendChild(d1);

                const d2 = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                d2.setAttribute("width", "6");
                d2.setAttribute("height", "6");
                d2.setAttribute("class", "svg-diamond");
                g.appendChild(d2);

                svgOverlay.appendChild(g);
                svgPaths[conn.id] = { path, d1, d2 };
            });
        }

        function render(time) {
            ctx.clearRect(0, 0, width, height);

            const t = time * 0.001;
            
            
            const baseYaw = t * 0.5; 
            
            const pitch = 0.15; 
            const roll = Math.sin(t * 0.2) * 0.1;

            const layers = [
                { offsetY: 60, opacity: 0.05, strokeWidth: 1 },
                { offsetY: 30, opacity: 0.1, strokeWidth: 1 },
                { offsetY: 0, opacity: 1.0, strokeWidth: 1.5 } 
            ];

            let transformedEdges = edges.map(edge => {
                const p1Rot = rotate3D(edge.p1, pitch, baseYaw, roll);
                const p2Rot = rotate3D(edge.p2, pitch, baseYaw, roll);
                const p1Proj = project3D(p1Rot);
                const p2Proj = project3D(p2Rot);
                const avgZ = (p1Rot.z + p2Rot.z) / 2;
                return { p1Proj, p2Proj, avgZ, type: edge.type };
            });

            transformedEdges.sort((a, b) => b.avgZ - a.avgZ);

            layers.forEach(layer => {
                ctx.lineWidth = layer.strokeWidth;
                
                transformedEdges.forEach(edge => {
                    let depthAlpha = 1 - (edge.avgZ + RADIUS) / (RADIUS * 2.5);
                    depthAlpha = Math.max(0.1, Math.min(1, depthAlpha)); 
                    
                    if (edge.type === 'heavy') depthAlpha = Math.min(1, depthAlpha * 1.5);
                    
                    const finalAlpha = depthAlpha * layer.opacity;

                    ctx.strokeStyle = `rgba(255, 26, 26, ${finalAlpha})`;
                    
                    ctx.beginPath();
                    ctx.moveTo(edge.p1Proj.x, edge.p1Proj.y + layer.offsetY);
                    ctx.lineTo(edge.p2Proj.x, edge.p2Proj.y + layer.offsetY);
                    ctx.stroke();
                });
            });

            labelConnections.forEach(conn => {
                const anchor3D = anchors[conn.id];
                const rotatedAnchor = rotate3D(anchor3D, pitch, baseYaw, roll);
                const projectedAnchor = project3D(rotatedAnchor);

                const labelEl = document.getElementById(conn.labelId);
                const rect = labelEl.getBoundingClientRect();
                
                let startX, startY;
                if (conn.align === 'left') {
                    startX = rect.right + 10;
                    startY = rect.top + rect.height / 2;
                } else {
                    startX = rect.left - 10;
                    startY = rect.top + rect.height / 2;
                }

                const targetX = projectedAnchor.x;
                const targetY = projectedAnchor.y;
                
                const hDir = conn.align === 'left' ? 1 : -1;
                const hLength = 60;
                const midX = startX + (hLength * hDir);

                const d = `M ${startX} ${startY} L ${midX} ${startY} L ${targetX} ${targetY}`;
                
                const elements = svgPaths[conn.id];
                elements.path.setAttribute("d", d);

                const offset = 3; 
                elements.d1.setAttribute("transform", `translate(${startX - offset}, ${startY - offset}) rotate(45 3 3)`);
                elements.d2.setAttribute("transform", `translate(${targetX - offset}, ${targetY - offset}) rotate(45 3 3)`);
            });

            requestAnimationFrame(render);
        }

        function init() {
            generateGeometry();
            initSVG();
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        init();

    </script>

</body></html>
