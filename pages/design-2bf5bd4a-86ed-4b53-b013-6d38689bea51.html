<body class="bg-[#121212] flex items-center justify-center min-h-screen p-4" vid="8">

            <div class="flex justify-between items-center mb-5" vid="11">
                
                
                <div class="flex items-center bg-zinc-100/80 p-1 rounded-full border border-zinc-200/50 shadow-inner" vid="12">

                <button class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-50 text-zinc-400 hover:bg-zinc-100 hover:text-zinc-700 transition-colors focus:outline-none" aria-label="Close" vid="21">

            </div>

            
            <div class="relative flex items-center w-full h-12 bg-zinc-50 rounded-2xl border border-zinc-200/80 focus-within:border-blue-500 focus-within:ring-[3px] focus-within:ring-blue-100 transition-all mb-4" vid="24">

                    </svg>

            <div class="flex items-center justify-between" vid="29">

                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z" vid="32"></path>
                    </svg>
                    <span class="text-[12px] font-semibold tracking-tight" vid="33">AI Search</span>
                </button>

                
                <div class="flex items-center gap-2" vid="34">
                    <button class="relative flex items-center justify-center gap-1.5 h-8 px-3 bg-white border border-zinc-200 rounded-full text-[12px] font-medium text-zinc-700 hover:bg-zinc-50 transition-all shadow-sm" vid="35">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-zinc-500" vid="36">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" vid="37"></path>
                        </svg>
                        Filters
                        <span class="flex items-center justify-center min-w-[14px] h-[14px] ml-0.5 bg-zinc-800 text-white text-[9px] font-bold rounded-full" vid="38">
                            3
                        </span>
                    </button>

                    <button class="flex items-center justify-center gap-1.5 h-8 px-3 bg-white border border-zinc-200 rounded-full text-[12px] font-medium text-zinc-700 hover:bg-zinc-50 transition-all shadow-sm" vid="39">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-amber-500" vid="40">

                        Tips

            </div>

        <main class="flex-1 px-5 pt-5 pb-4 bg-zinc-50/50 relative overflow-y-auto no-scrollbar" vid="42">
            
            <div class="absolute top-0 left-0 right-0 h-4 bg-gradient-to-b from-zinc-50 to-transparent z-10 pointer-events-none" vid="43"></div>
            
            <div class="grid grid-cols-2 gap-4 opacity-50" vid="44">
                
                <div class="bg-white p-3.5 rounded-2xl border border-zinc-100 shadow-sm flex flex-col" vid="45">

                    <div class="h-2.5 w-full bg-zinc-200 rounded-full animate-pulse mb-2" vid="47"></div>
                    <div class="h-2.5 w-1/2 bg-zinc-100 rounded-full animate-pulse" vid="48"></div>
                </div>
                
                <div class="bg-white p-3.5 rounded-2xl border border-zinc-100 shadow-sm flex flex-col" vid="49">

                    <div class="h-2.5 w-[85%] bg-zinc-200 rounded-full animate-pulse mb-2" vid="51"></div>
                    <div class="h-2.5 w-[60%] bg-zinc-100 rounded-full animate-pulse" vid="52"></div>
                </div>
            </div>

    </div>
