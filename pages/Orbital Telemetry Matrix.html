<!DOCTYPE html>
<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">Orbital Telemetry Matrix</title>
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet" vid="7">
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" vid="8"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" vid="9"></script>
    <script src="https://d3js.org/d3-array.v3.min.js" vid="10"></script>
    <script src="https://d3js.org/d3-geo.v3.min.js" vid="11"></script>

    <style vid="12">
        :root {
            --bg: #030303;
            --fg: #ffffff;
            --fg-muted: #777777;
            --accent: #EBF27A;
            --grid-line: rgba(255, 255, 255, 0.1);
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            overflow: hidden;
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center center;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: crosshair;
        }

        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--fg-muted);
        }

        .sys-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--fg);
        }

        .sys-status::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        
        .hero-title {
            position: absolute;
            top: 15%;
            left: 24px;
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 500;
            line-height: 0.9;
            letter-spacing: -0.04em;
            color: var(--fg);
            pointer-events: auto; 
            mix-blend-mode: difference;
        }

        .hero-title span {
            display: block;
            color: var(--fg-muted);
        }

        
        .data-panel {
            width: 100%;
            border-top: 1px solid var(--grid-line);
            padding-top: 24px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            pointer-events: auto; 
            background: linear-gradient(to top, rgba(3,3,3,0.9) 0%, rgba(3,3,3,0) 100%);
        }

        .data-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--fg-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .data-value {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .data-value.accent {
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 12px;
        }

        
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent);
            z-index: 10;
            letter-spacing: 0.2em;
        }

        
        @media (min-width: 768px) {
            .ui-layer { padding: 40px; }
            .hero-title { top: 20%; left: 40px; }
            .data-panel { 
                grid-template-columns: repeat(4, 1fr); 
                padding-top: 40px;
            }
        }
    </style>
</head>
<body vid="13">

    <div id="loader" vid="14" style="display: none;">ACQUIRING TELEMETRY...</div>
    <div id="webgl-container" vid="15"><canvas width="400" height="867" style="display: block; width: 400px; height: 867px;"></canvas></div>

    <div class="ui-layer" vid="16">
        <header vid="17">
            <div vid="18">AERO.DEV // OP-GRID-09</div>
            <div class="sys-status" vid="19">ORBITAL LINK ACTIVE</div>
        </header>

        <h1 class="hero-title" vid="20">
            Global<br vid="21">
            <span vid="22">Telemetry</span>
        </h1>

        <div class="data-panel" vid="23">
            <div class="data-block" vid="24">
                <span class="data-label" vid="25">Selected Sector</span>
                <span class="data-value" id="ui-sector" vid="26">AWAITING INPUT</span>
            </div>
            <div class="data-block" vid="27">
                <span class="data-label" vid="28">Active Nodes</span>
                <span class="data-value accent" id="ui-nodes" vid="29">00</span>
            </div>
            <div class="data-block" vid="30">
                <span class="data-label" vid="31">Centroid Coords</span>
                <span class="data-value" id="ui-coords" vid="32">--/--</span>
            </div>
            <div class="data-block" vid="33">
                <span class="data-label" vid="34">System Integrity</span>
                <span class="data-value" style="color: var(--fg-muted)" vid="35">NOMINAL</span>
            </div>
        </div>
    </div>

    <script vid="36">
        
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 120;
        camera.position.y = 20; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = false; 
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        
        const GLOBE_RADIUS = 40;
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        
        const hitGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
        const hitMaterial = new THREE.MeshBasicMaterial({ visible: false });
        const hitSphere = new THREE.Mesh(hitGeometry, hitMaterial);
        globeGroup.add(hitSphere);

        
        const gridMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
        
        
        for (let i = -80; i <= 80; i += 20) {
            const rad = GLOBE_RADIUS * Math.cos(i * Math.PI / 180);
            const y = GLOBE_RADIUS * Math.sin(i * Math.PI / 180);
            const geo = new THREE.BufferGeometry();
            const pts = [];
            for (let j = 0; j <= 360; j += 5) {
                pts.push(new THREE.Vector3(
                    rad * Math.cos(j * Math.PI / 180),
                    y,
                    rad * Math.sin(j * Math.PI / 180)
                ));
            }
            geo.setFromPoints(pts);
            globeGroup.add(new THREE.Line(geo, gridMaterial));
        }

        
        for (let i = 0; i < 360; i += 20) {
            const geo = new THREE.BufferGeometry();
            const pts = [];
            for (let j = -90; j <= 90; j += 5) {
                const rad = GLOBE_RADIUS * Math.cos(j * Math.PI / 180);
                const y = GLOBE_RADIUS * Math.sin(j * Math.PI / 180);
                pts.push(new THREE.Vector3(
                    rad * Math.cos(i * Math.PI / 180),
                    y,
                    rad * Math.sin(i * Math.PI / 180)
                ));
            }
            geo.setFromPoints(pts);
            globeGroup.add(new THREE.Line(geo, gridMaterial));
        }

        
        let geoJsonData = null;
        const countryMeshes = new Map(); 
        const baseLineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        const activeLineMaterial = new THREE.LineBasicMaterial({ color: 0xEBF27A, linewidth: 2 }); 
        
        
        const dotsGroup = new THREE.Group();
        globeGroup.add(dotsGroup);

        
        function getVertex(lon, lat, radius = GLOBE_RADIUS) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        
        
        fetch('https://unpkg.com/world-atlas@2.0.2/countries-110m.json')
            .then(response => response.json())
            .then(topoData => {
                
                
                
                return fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
            })
            .then(res => res.json())
            .then(data => {
                geoJsonData = data;
                document.getElementById('loader').style.display = 'none';

                data.features.forEach(feature => {
                    const featureGroup = new THREE.Group();
                    const name = feature.properties.name;
                    
                    
                    function drawCoords(coords) {
                        if (typeof coords[0][0] === 'number') {
                            const points = [];
                            coords.forEach(coord => {
                                points.push(getVertex(coord[0], coord[1]));
                            });
                            const geometry = new THREE.BufferGeometry().setFromPoints(points);
                            const line = new THREE.Line(geometry, baseLineMaterial.clone());
                            featureGroup.add(line);
                        } else {
                            coords.forEach(c => drawCoords(c));
                        }
                    }

                    drawCoords(feature.geometry.coordinates);
                    globeGroup.add(featureGroup);
                    countryMeshes.set(name, featureGroup);
                });
            })
            .catch(err => {
                document.getElementById('loader').innerText = "DATA ACQUISITION FAILED";
                console.error(err);
            });


        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let currentActiveFeatureName = null;

        
        function getPointerPos(event) {
            let x, y;
            if (event.changedTouches) {
                x = event.changedTouches[0].clientX;
                y = event.changedTouches[0].clientY;
            } else {
                x = event.clientX;
                y = event.clientY;
            }
            return { x, y };
        }

        function onPointerDown(event) {
            
            controls.autoRotate = false;

            const pos = getPointerPos(event);
            mouse.x = (pos.x / window.innerWidth) * 2 - 1;
            mouse.y = -(pos.y / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            
            const intersects = raycaster.intersectObject(hitSphere);

            if (intersects.length > 0 && geoJsonData) {
                const point = intersects[0].point;
                
                
                
                
                
                const lat = 90 - (Math.acos(point.y / GLOBE_RADIUS)) * 180 / Math.PI;
                const lon = ((270 + (Math.atan2(point.x, point.z)) * 180 / Math.PI) % 360) - 180;

                
                const clickedFeature = geoJsonData.features.find(f => d3.geoContains(f, [lon, lat]));

                if (clickedFeature) {
                    const name = clickedFeature.properties.name;
                    if(name !== currentActiveFeatureName) {
                        highlightFeature(clickedFeature);
                    }
                }
            }
        }

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('touchstart', onPointerDown, {passive: false});

        function highlightFeature(feature) {
            const name = feature.properties.name;
            
            
            if (currentActiveFeatureName && countryMeshes.has(currentActiveFeatureName)) {
                const prevGroup = countryMeshes.get(currentActiveFeatureName);
                prevGroup.children.forEach(line => line.material = baseLineMaterial.clone());
            }

            
            if (countryMeshes.has(name)) {
                const newGroup = countryMeshes.get(name);
                newGroup.children.forEach(line => {
                    line.material = activeLineMaterial;
                    
                    line.position.setLength(0.5); 
                });
                currentActiveFeatureName = name;
                
                
                generateInnerDots(feature);

                
                updateUI(feature);
            }
        }

        function generateInnerDots(feature) {
            
            while(dotsGroup.children.length > 0){ 
                dotsGroup.remove(dotsGroup.children[0]); 
            }

            const bounds = d3.geoBounds(feature);
            const [minLon, minLat] = bounds[0];
            const [maxLon, maxLat] = bounds[1];
            
            
            const numDots = Math.floor(Math.random() * 6) + 10; 
            
            const dotGeometry = new THREE.SphereGeometry(0.3, 8, 8);
            const dotMaterial = new THREE.MeshBasicMaterial({ color: 0xEBF27A });

            let dotsAdded = 0;
            let attempts = 0;
            const maxAttempts = 2000; 

            while(dotsAdded < numDots && attempts < maxAttempts) {
                attempts++;
                const rLon = minLon + Math.random() * (maxLon - minLon);
                const rLat = minLat + Math.random() * (maxLat - minLat);
                
                if(d3.geoContains(feature, [rLon, rLat])) {
                    const mesh = new THREE.Mesh(dotGeometry, dotMaterial);
                    
                    mesh.position.copy(getVertex(rLon, rLat, GLOBE_RADIUS + 0.5));
                    dotsGroup.add(mesh);
                    dotsAdded++;
                }
            }
        }

        function updateUI(feature) {
            document.getElementById('ui-sector').innerText = feature.properties.name.toUpperCase();
            document.getElementById('ui-nodes').innerText = dotsGroup.children.length.toString().padStart(2, '0');
            
            const centroid = d3.geoCentroid(feature);
            const latStr = Math.abs(centroid[1]).toFixed(2) + (centroid[1] >= 0 ? 'N' : 'S');
            const lonStr = Math.abs(centroid[0]).toFixed(2) + (centroid[0] >= 0 ? 'E' : 'W');
            document.getElementById('ui-coords').innerText = `${latStr} / ${lonStr}`;
        }

        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            
            if(dotsGroup.children.length > 0) {
                const time = Date.now() * 0.005;
                dotsGroup.children.forEach((dot, i) => {
                    const scale = 1 + Math.sin(time + i) * 0.3;
                    dot.scale.set(scale, scale, scale);
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        
        gsap_mock_timeout = setTimeout(() => {
            controls.autoRotate = false;
        }, 5000); 

    </script>

</body></html>
